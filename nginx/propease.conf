# ============================================
# MBPP Properties — Nginx Configuration
# Reverse proxy: Next.js + Express + Static Files
# ============================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;

server {
    listen 80;
    server_name mbpproperties.com www.mbpproperties.com;

    # ---- Uploaded files (served directly from disk) ----
    location /uploads/ {
        alias /var/www/mbpp-uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # ---- Next.js static assets (JS, CSS, fonts, images) ----
    # Served directly from disk — bypasses Next.js server to avoid 500 errors on CSS
    location /_next/static/ {
        alias /var/www/mbpp/frontend/.next/static/;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # ---- Express API (port 4000) ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Hide Cloudflare report-only CSP from API responses
        proxy_hide_header Content-Security-Policy-Report-Only;

        # API responses should not be cached
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header CDN-Cache-Control "no-store";

        client_max_body_size 15M;
    }

    # ---- Next.js Frontend (port 3000) ----
    location / {
        limit_req zone=web burst=50 nodelay;

        proxy_pass http://127.0.0.1:9799;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Hide Cloudflare injected CSP - Next.js handles its own CSP
        proxy_hide_header Content-Security-Policy-Report-Only;
    }

    # ---- Security Headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;
}
