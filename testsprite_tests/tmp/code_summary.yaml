features:
  - name: Property Search & Browse
    description: Browse and search property listings with filters
    files:
      - src/app/page.tsx
      - src/components/listings/PropertyCard.tsx
      - src/components/listings/PropertyFilters.tsx
      - src/lib/mock-data.ts
      - src/lib/types.ts
    entry_route: /
    user_interactions:
      - View property cards on homepage
      - Apply filters by location, price range, property type
      - Scroll and click Show More for additional listings
      - Click property card to view details
    api_calls: []
    auth_required: false
  - name: Property Detail View
    description: View detailed property information
    files:
      - src/app/listings/[id]/page.tsx
      - src/lib/mock-data.ts
      - src/lib/types.ts
    entry_route: /listings/[id]
    user_interactions:
      - View property photos and details
      - See rent tier breakdown for rentals
      - View agent contact information
    api_calls: []
    auth_required: false
  - name: User Authentication
    description: User login and registration
    files:
      - src/app/login/page.tsx
      - src/app/register/page.tsx
      - src/context/RoleContext.tsx
    entry_route: /login
    user_interactions:
      - Fill registration form with name, email, password
      - Submit registration
      - Login with email and password
      - See dashboard after successful login
      - Logout from navigation
    api_calls: []
    auth_required: false
  - name: Save Favorites
    description: Save and view favorite properties
    files:
      - src/app/saved/page.tsx
      - src/lib/favorites.ts
    entry_route: /saved
    user_interactions:
      - Click save/heart icon on property card
      - Navigate to saved properties page
      - View all saved listings
      - Remove saved properties
    api_calls: []
    auth_required: false
  - name: Admin Dashboard
    description: Full admin management interface
    files:
      - src/app/admin/page.tsx
      - src/app/admin/users/page.tsx
      - src/app/admin/crm/page.tsx
      - src/app/admin/outsourcing/page.tsx
      - src/app/admin/agent-tracking/page.tsx
      - src/app/admin/commissions/page.tsx
      - src/app/admin/deals/page.tsx
    entry_route: /admin
    user_interactions:
      - View admin overview stats
      - Manage users (view, edit roles)
      - View CRM data
      - Track outsourcing requests
      - Monitor agent performance
      - Manage commissions and deals
    api_calls: []
    auth_required: true
  - name: Agent Dashboard
    description: Agent workflow management
    files:
      - src/app/agent/page.tsx
      - src/app/agent/task-board/page.tsx
      - src/app/agent/inquiries/page.tsx
      - src/components/tasks/TaskBoard.tsx
      - src/components/tasks/TaskCard.tsx
    entry_route: /agent
    user_interactions:
      - View agent dashboard overview
      - Manage task board
      - Respond to inquiries
      - View commission history
      - Manage wallet
    api_calls: []
    auth_required: true
  - name: Ambassador Dashboard
    description: Ambassador property listing and task management
    files:
      - src/app/ambassador/page.tsx
      - src/app/ambassador/post-listing/page.tsx
      - src/app/ambassador/create-task/page.tsx
    entry_route: /ambassador
    user_interactions:
      - View city overview
      - Post new property listings
      - Create tasks for agents
      - View commissions and wallet
    api_calls: []
    auth_required: true
  - name: Custom Order Request
    description: Request custom property matching
    files:
      - src/app/custom-order/page.tsx
    entry_route: /custom-order
    user_interactions:
      - Fill custom property requirements form
      - Submit order request
    api_calls: []
    auth_required: false
known_limitations:
  - issue: All data is mocked - no real API integration on frontend
    location: src/lib/mock-data.ts
    impact: Properties, users, tasks use static mock data not persisted
  - issue: Authentication is localStorage-based stub, not real auth
    location: src/context/RoleContext.tsx
    impact: Login/register only stores in localStorage, no JWT validation
  - issue: Backend API exists but frontend does not consume it
    location: backend/src/routes/
    impact: Frontend uses mock data instead of real API calls
